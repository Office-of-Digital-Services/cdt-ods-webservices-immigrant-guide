<!doctype html>
<html lang="{{ lang }}">
  <head>
    <title>{{ title }}</title>
    <meta charset="utf-8" />
    <meta name="Author" content="State of California" />
    <meta name="Description" content="{{ description }}" />
    {%- if noindex %}
    <meta name="robots" content="noindex" />
    {%- elseif noindex_follow %}
    <meta name="robots" content="noindex, follow" />
    {%- else %}
    <meta name="robots" content="index, follow" />
    {%- endif %}
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="HandheldFriendly" content="True" />
    <meta name="MobileOptimized" content="320" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />
    <!-- Primary Meta Tags -->
    <meta name="title" content="{{ title }}" />

    <!-- Canonical link, improves SEO -->
    <link href="{% canonical %}" rel="canonical" />

    <!-- Open Graph / Facebook -->
    <meta property="og:locale" content="{{ lang }}" />
    <meta property="og:site_name" content="{{ title }}" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="{% canonical %}" />
    <meta property="og:title" content="{{ title }}" />

    <meta property="og:description" content="{{ description }}" />

    <meta
      property="og:image"
      content="https://www.immigrantguide.ca.gov/images/immigrant-guide-social.jpg" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="{% canonical %}" />
    <meta name="twitter:title" content="{{ title }}" />

    <meta name="twitter:description" content="{{ Description }}" />

    <meta
      name="twitter:image"
      content="https://www.immigrantguide.ca.gov/images/immigrant-guide-social.jpg" />

    <link rel="shortcut icon" href="/favicon.ico" />

    <!-- FONT-->
    <!-- Preconnects and preloads -->

    <link
      rel="preload"
      href="/fonts/CaGov.woff2"
      as="font"
      type="font/woff2"
      crossorigin />

    <link href="/css/styles.min.css?vJun_" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="/css/dark.css"
      media="(prefers-color-scheme: dark)" />

    {%- if customcss -%}
    <link rel="stylesheet" href="{{ customcss }}" />
    {%- endif -%}

    <!-- SCRIPTS-->
    <script src="/js/template.js?vJun" defer></script>
    <script src="/js/translate.js?vJun" defer></script>

    <!-- BEGIN Google Analytics -->

    <script>
      (function () {
        var statewideGA4 = "G-69TD0KNT0F"; // REQUIRED: Statewide GA4 ID (do not change) ---
        var siteGA4 = "G-Q1VB7473FM"; // Replace with your site's GA4 ID

        var loadGA4 = function () {
          var gtagScript = document.createElement('script');
          gtagScript.async = true;
          gtagScript.src =
            "https://www.googletagmanager.com/gtag/js?id=" + statewideGA4;
          document.head.appendChild(gtagScript);

          window.dataLayer = window.dataLayer || [];
          function gtag(){ dataLayer.push(arguments); }

          gtag("js", new Date());

          // Cookie flags (forces GA4 to use the actual hostname)
          var cookieFlags = "secure;samesite=lax;domain=";

          gtag("config", statewideGA4, {
            cookie_flags: cookieFlags
          });
          gtag("config", siteGA4, {
            cookie_flags: cookieFlags
          });
        };

        // Performance-friendly idle load
        if ("requestIdleCallback" in window) {
          requestIdleCallback(loadGA4);
        } else {
          setTimeout(loadGA4, 200);
        }
      })();
    </script>
    <!-- END Google Analytics -->
    <!-- Statewide Alerts Server -->
    <script
      defer
      src="https://alert.cdt.ca.gov"
      crossorigin="anonymous"></script>
  </head>
  <body style="margin: 0px">
    {% include 'header.html' %} {{ content | safe }} {% include 'footer.html' %}
  </body>
</html>
